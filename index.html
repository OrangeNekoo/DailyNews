<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日新闻日报</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', 'SimSun', serif;
            background: #f5f0e6;
            background-image: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(139, 119, 101, 0.03) 2px,
                    rgba(139, 119, 101, 0.03) 4px
                );
            color: #2c241b;
            line-height: 1.8;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 报头 */
        .masthead {
            text-align: center;
            padding: 30px 20px;
            border-bottom: 3px double #8b7765;
            margin-bottom: 20px;
        }

        .masthead h1 {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 0.3em;
            color: #1a1a1a;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            margin-bottom: 10px;
        }

        .masthead .tagline {
            font-size: 0.9rem;
            color: #666;
            letter-spacing: 0.2em;
            font-style: italic;
        }

        .date-line {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 10px 0;
            border-top: 1px solid #8b7765;
            border-bottom: 1px solid #8b7765;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .date-line span {
            color: #555;
        }

        /* 分类标题 */
        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            padding: 15px 0;
            margin: 30px 0 20px;
            border-top: 2px solid #8b7765;
            border-bottom: 1px solid #8b7765;
            background: linear-gradient(to bottom, #faf8f3, #f5f0e6);
            position: relative;
        }

        .section-title::before,
        .section-title::after {
            content: "❧";
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #8b7765;
            font-size: 1.2rem;
        }

        .section-title::before {
            left: 20px;
        }

        .section-title::after {
            right: 20px;
        }

        /* 新闻网格 */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .news-card {
            background: #faf8f3;
            border: 1px solid #d4c4b0;
            padding: 20px;
            transition: all 0.3s ease;
            position: relative;
        }

        .news-card::before {
            content: "";
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            border: 1px solid rgba(139, 119, 101, 0.2);
            pointer-events: none;
        }

        .news-card:hover {
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }

        .news-card .category {
            display: inline-block;
            font-size: 0.75rem;
            color: #8b4513;
            border: 1px solid #8b4513;
            padding: 2px 10px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .news-card h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 10px;
            line-height: 1.5;
            color: #1a1a1a;
        }

        .news-card h3 a {
            color: inherit;
            text-decoration: none;
            border-bottom: 1px dotted #8b7765;
            transition: color 0.3s;
        }

        .news-card h3 a:hover {
            color: #8b4513;
        }

        .news-card .summary {
            font-size: 0.9rem;
            color: #444;
            line-height: 1.7;
            margin-bottom: 10px;
        }

        .news-card .meta {
            font-size: 0.8rem;
            color: #888;
            font-style: italic;
            border-top: 1px dashed #d4c4b0;
            padding-top: 8px;
        }

        /* 页脚 */
        .footer {
            text-align: center;
            padding: 30px;
            border-top: 2px solid #8b7765;
            margin-top: 40px;
            font-size: 0.85rem;
            color: #666;
        }

        .footer p {
            margin: 5px 0;
        }

        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: #8b7765;
        }

        .loading::after {
            content: "...";
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: ""; }
            40% { content: "."; }
            60% { content: ".."; }
            80%, 100% { content: "..."; }
        }

        /* 错误提示 */
        .error {
            text-align: center;
            padding: 50px;
            color: #8b4513;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .masthead h1 {
                font-size: 2rem;
                letter-spacing: 0.15em;
            }

            .section-title {
                font-size: 1.4rem;
            }

            .section-title::before,
            .section-title::after {
                display: none;
            }

            .news-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .news-card {
                padding: 15px;
            }

            .container {
                padding: 10px;
            }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .news-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1025px) {
            .news-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* 装饰元素 */
        .ornament {
            text-align: center;
            font-size: 1.5rem;
            color: #8b7765;
            margin: 20px 0;
            letter-spacing: 0.5em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="masthead">
            <h1>每日新闻日报</h1>
            <p class="tagline">Daily News · 知天下事</p>
        </header>

        <div class="date-line">
            <span id="current-date">加载中...</span>
            <span>|</span>
            <span>农历乙巳年三月初五</span>
            <span>|</span>
            <span>第 001 期</span>
        </div>

        <div id="content">
            <div class="loading">正在加载今日新闻</div>
        </div>

        <footer class="footer">
            <div class="ornament">※ ※ ※</div>
            <p>每日早8点自动更新 · 汇集全球要闻</p>
            <p>© 2025 每日新闻日报 · 数据来源：各大新闻媒体</p>
        </footer>
    </div>

    <script>
        // 获取今天的日期
        function getTodayDate() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const weekday = weekdays[today.getDay()];
            return {
                fileDate: `${year}-${month}-${day}`,
                displayDate: `${year}年${month}月${day}日 ${weekday}`
            };
        }

        // 加载新闻数据
        async function loadNews() {
            const dateInfo = getTodayDate();
            document.getElementById('current-date').textContent = dateInfo.displayDate;

            try {
                const response = await fetch(`news/${dateInfo.fileDate}.json`);
                if (!response.ok) {
                    throw new Error('今日新闻尚未更新');
                }
                const data = await response.json();
                renderNews(data);
            } catch (error) {
                // 如果今天的文件不存在，尝试加载示例数据
                try {
                    const response = await fetch('news/2025-04-02.json');
                    if (response.ok) {
                        const data = await response.json();
                        renderNews(data);
                    } else {
                        showError('暂无新闻数据');
                    }
                } catch (e) {
                    showError('加载新闻失败，请稍后重试');
                }
            }
        }

        // 渲染新闻
        function renderNews(data) {
            const content = document.getElementById('content');
            const categories = {
                '科技': [],
                '财经': [],
                '国际': [],
                '国内': []
            };

            // 按分类整理新闻
            data.news.forEach(item => {
                if (categories[item.category]) {
                    categories[item.category].push(item);
                }
            });

            let html = '';
            const categoryNames = {
                '科技': '科技前沿',
                '财经': '财经要闻',
                '国际': '国际视野',
                '国内': '国内新闻'
            };

            for (const [category, items] of Object.entries(categories)) {
                if (items.length > 0) {
                    html += `<h2 class="section-title">${categoryNames[category]}</h2>`;
                    html += '<div class="news-grid">';
                    
                    items.forEach(item => {
                        html += `
                            <article class="news-card">
                                <span class="category">${item.category}</span>
                                <h3><a href="${item.url}" target="_blank" rel="noopener noreferrer">${item.title}</a></h3>
                                <p class="summary">${item.summary}</p>
                                <div class="meta">来源：${item.source}</div>
                            </article>
                        `;
                    });
                    
                    html += '</div>';
                }
            }

            content.innerHTML = html;
        }

        // 显示错误
        function showError(message) {
            document.getElementById('content').innerHTML = `
                <div class="error">
                    <p>${message}</p>
                    <p style="font-size: 0.9rem; margin-top: 10px;">请稍后再试或联系管理员</p>
                </div>
            `;
        }

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', loadNews);
    </script>
</body>
</html>
